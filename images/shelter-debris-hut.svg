<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" fill="none">
  <rect width="600" height="300" rx="12" fill="#F5F0E8"/>
  <text x="300" y="30" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#6B4226">Lean-To Shelter</text>
  <!-- Ground -->
  <rect x="0" y="240" width="600" height="60" fill="#8B7355"/>
  <rect x="0" y="235" width="600" height="8" fill="#6B8E23"/>
  <!-- Ridge pole -->
  <line x1="120" y1="100" x2="480" y2="100" stroke="#8B4513" stroke-width="6"/>
  <!-- Support posts -->
  <line x1="120" y1="100" x2="100" y2="240" stroke="#8B4513" stroke-width="5"/>
  <line x1="480" y1="100" x2="500" y2="240" stroke="#8B4513" stroke-width="5"/>
  <!-- Lean-to ribs -->
  <line x1="160" y1="100" x2="160" y2="240" stroke="#A0522D" stroke-width="3"/>
  <line x1="220" y1="100" x2="220" y2="240" stroke="#A0522D" stroke-width="3"/>
  <line x1="280" y1="100" x2="280" y2="240" stroke="#A0522D" stroke-width="3"/>
  <line x1="340" y1="100" x2="340" y2="240" stroke="#A0522D" stroke-width="3"/>
  <line x1="400" y1="100" x2="400" y2="240" stroke="#A0522D" stroke-width="3"/>
  <line x1="450" y1="100" x2="450" y2="240" stroke="#A0522D" stroke-width="3"/>
  <!-- Debris layer suggestion -->
  <path d="M120 100 L480 100 L500 240 L100 240 Z" fill="#6B8E23" opacity="0.3"/>
  <!-- Labels -->
  <text x="300" y="80" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#333">Ridge Pole</text>
  <text x="50" y="170" font-family="Arial,sans-serif" font-size="13" fill="#333" transform="rotate(-70 50 170)">Support</text>
  <text x="300" y="180" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#333">Cover with leaves &amp; debris</text>
  <text x="300" y="275" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#FFF">Source: FEMA / Ready.gov — Wilderness Preparedness</text>
</svg>
