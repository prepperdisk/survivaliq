<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" fill="none">
  <rect width="600" height="350" rx="12" fill="#F0FFF0"/>
  <text x="300" y="30" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#2E7D32">Reading a Compass</text>
  <!-- Compass body -->
  <circle cx="300" cy="185" r="130" fill="#F5F5DC" stroke="#333" stroke-width="3"/>
  <circle cx="300" cy="185" r="120" fill="#FFF" stroke="#666" stroke-width="1"/>
  <!-- Degree marks -->
  <line x1="300" y1="70" x2="300" y2="80" stroke="#333" stroke-width="2"/>
  <line x1="300" y1="290" x2="300" y2="300" stroke="#333" stroke-width="2"/>
  <line x1="175" y1="185" x2="185" y2="185" stroke="#333" stroke-width="2"/>
  <line x1="415" y1="185" x2="425" y2="185" stroke="#333" stroke-width="2"/>
  <!-- Cardinal directions -->
  <text x="300" y="92" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#CC0000">N</text>
  <text x="300" y="295" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#333">S</text>
  <text x="192" y="191" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#333">W</text>
  <text x="408" y="191" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#333">E</text>
  <!-- Needle -->
  <polygon points="300,100 293,185 307,185" fill="#CC0000"/>
  <polygon points="300,270 293,185 307,185" fill="#CCC" stroke="#999" stroke-width="0.5"/>
  <circle cx="300" cy="185" r="5" fill="#333"/>
  <!-- Degree labels -->
  <text x="300" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#666">0°/360°</text>
  <text x="430" y="188" text-anchor="start" font-family="Arial,sans-serif" font-size="10" fill="#666">90°</text>
  <text x="300" y="316" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#666">180°</text>
  <text x="170" y="188" text-anchor="end" font-family="Arial,sans-serif" font-size="10" fill="#666">270°</text>
  <!-- Instructions -->
  <text x="300" y="340" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#666">Red needle always points to magnetic north</text>
</svg>
