<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380" fill="none">
  <rect width="600" height="380" rx="12" fill="#F5F0E0"/>
  <text x="300" y="28" text-anchor="middle" font-family="Arial,sans-serif" font-size="17" font-weight="bold" fill="#2E7D32">Shadow-Stick Method (Sun Stick Navigation)</text>

  <!-- Ground -->
  <rect x="40" y="260" width="520" height="80" rx="6" fill="#C8B888" opacity="0.5"/>

  <!-- Stick -->
  <line x1="300" y1="140" x2="300" y2="260" stroke="#6B4226" stroke-width="6" stroke-linecap="round"/>
  <text x="310" y="155" font-family="Arial,sans-serif" font-size="12" fill="#333">Stick (vertical)</text>

  <!-- Shadow 1 (morning - points west) -->
  <line x1="300" y1="260" x2="180" y2="260" stroke="#555" stroke-width="3" stroke-dasharray="6,3"/>
  <circle cx="180" cy="260" r="6" fill="#D32F2F"/>
  <text x="170" y="280" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#D32F2F">Mark 1</text>
  <text x="170" y="293" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#666">(first shadow tip)</text>

  <!-- Shadow 2 (later - points east, shorter) -->
  <line x1="300" y1="260" x2="410" y2="260" stroke="#555" stroke-width="3" stroke-dasharray="6,3"/>
  <circle cx="410" cy="260" r="6" fill="#1565C0"/>
  <text x="420" y="280" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#1565C0">Mark 2</text>
  <text x="420" y="293" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#666">(15-30 min later)</text>

  <!-- East-West line -->
  <line x1="180" y1="260" x2="410" y2="260" stroke="#FF9800" stroke-width="3"/>
  <text x="155" y="250" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#FF9800">W</text>
  <text x="435" y="250" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#FF9800">E</text>

  <!-- North-South line (perpendicular) -->
  <line x1="295" y1="210" x2="295" y2="310" stroke="#2E7D32" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="295" y="205" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#2E7D32">N</text>
  <text x="295" y="325" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#2E7D32">S</text>
  <text x="295" y="338" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#666">(Northern Hemisphere)</text>

  <!-- Sun arc -->
  <path d="M120 120 Q300 40 480 120" stroke="#FFD600" stroke-width="2" stroke-dasharray="5,4" fill="none"/>
  <!-- Sun morning position -->
  <circle cx="140" cy="110" r="16" fill="#FFD600"/>
  <text x="140" y="98" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#996600">AM</text>
  <!-- Sun afternoon position -->
  <circle cx="460" cy="110" r="16" fill="#FFD600"/>
  <text x="460" y="98" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#996600">PM</text>
  <!-- Sun arc label -->
  <text x="300" y="60" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#996600">Sun arc (east → west)</text>

  <!-- Instructions -->
  <text x="300" y="365" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#666">Line from Mark 1 → Mark 2 = approximate east-west line (Source: U.S. Army FM 3-25.26)</text>
</svg>
