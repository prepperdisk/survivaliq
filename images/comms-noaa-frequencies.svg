<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" fill="none">
  <rect width="600" height="320" rx="12" fill="#FFFFF0"/>
  <text x="300" y="30" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#B8860B">NOAA Weather Radio Frequencies</text>
  <!-- Radio body -->
  <rect x="50" y="60" width="200" height="220" rx="15" fill="#444" stroke="#222" stroke-width="2"/>
  <rect x="70" y="80" width="160" height="50" rx="5" fill="#1a1a1a"/>
  <text x="150" y="112" text-anchor="middle" font-family="monospace" font-size="20" fill="#0F0">162.550</text>
  <!-- Speaker grille -->
  <line x1="80" y1="150" x2="220" y2="150" stroke="#555" stroke-width="1"/>
  <line x1="80" y1="160" x2="220" y2="160" stroke="#555" stroke-width="1"/>
  <line x1="80" y1="170" x2="220" y2="170" stroke="#555" stroke-width="1"/>
  <line x1="80" y1="180" x2="220" y2="180" stroke="#555" stroke-width="1"/>
  <line x1="80" y1="190" x2="220" y2="190" stroke="#555" stroke-width="1"/>
  <!-- Antenna -->
  <line x1="200" y1="60" x2="220" y2="15" stroke="#666" stroke-width="3"/>
  <!-- Frequency table -->
  <rect x="290" y="55" width="280" height="230" rx="8" fill="#FFF" stroke="#CCC" stroke-width="1"/>
  <text x="430" y="80" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#333">All 7 NOAA Frequencies (MHz)</text>
  <text x="430" y="108" text-anchor="middle" font-family="monospace" font-size="14" fill="#333">162.400</text>
  <text x="430" y="130" text-anchor="middle" font-family="monospace" font-size="14" fill="#333">162.425</text>
  <text x="430" y="152" text-anchor="middle" font-family="monospace" font-size="14" fill="#333">162.450</text>
  <text x="430" y="174" text-anchor="middle" font-family="monospace" font-size="14" fill="#0066CC" font-weight="bold">162.475</text>
  <text x="430" y="196" text-anchor="middle" font-family="monospace" font-size="14" fill="#0066CC" font-weight="bold">162.500</text>
  <text x="430" y="218" text-anchor="middle" font-family="monospace" font-size="14" fill="#0066CC" font-weight="bold">162.525</text>
  <text x="430" y="240" text-anchor="middle" font-family="monospace" font-size="14" fill="#0066CC" font-weight="bold">162.550</text>
  <text x="430" y="268" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#999">Blue = most commonly used</text>
  <text x="300" y="308" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#666">Source: NOAA / weather.gov — NWR All Hazards</text>
</svg>
